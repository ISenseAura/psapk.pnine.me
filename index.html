<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="description" content="uTen — unofficial Pokémon Showdown for Android." />
	<meta name="theme-color" content="#1a2744" />
	<title>uTen</title>
	<link rel="icon" href="assets/favicon.png" type="image/png" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="styles.css" />
</head>
<body>
	<div class="bg" aria-hidden="true">
		<div class="bg-glow"></div>
		<div class="sprite sprite-a"></div>
		<div class="sprite sprite-b"></div>
		<div class="sprite sprite-c"></div>
		<div class="sprite sprite-d"></div>
		<div class="sprite sprite-e"></div>
		<div class="sprite sprite-f"></div>
	</div>
	<main class="page">
		<header class="hero">
			<img class="logo" src="assets/icon.png" alt="" width="72" height="72" />
			<h1>uTen</h1>
			<p>Pokémon Showdown on Android.</p>
			<a class="btn" href="downloads/uten.apk" download>Download APK</a>
		</header>

		<section class="shots" aria-label="Screenshots">
			<img src="assets/screenshots/home.png" alt="Home" loading="lazy" />
			<img src="assets/screenshots/home-news.png" alt="Home with news" loading="lazy" />
			<img src="assets/screenshots/home-active-battle.png" alt="Active battle" loading="lazy" />
			<img src="assets/screenshots/chats.png" alt="Chats" loading="lazy" />
			<img src="assets/screenshots/dms.png" alt="Direct messages" loading="lazy" />
			<img src="assets/screenshots/chat-room.png" alt="Chat room" loading="lazy" />
			<img src="assets/screenshots/dm-chat.png" alt="Direct message" loading="lazy" />
			<img src="assets/screenshots/user-profile.png" alt="User profile" loading="lazy" />
			<img src="assets/screenshots/rooms-browser.png" alt="Rooms browser" loading="lazy" />
			<img src="assets/screenshots/battle-search.png" alt="Find a battle" loading="lazy" />
			<img src="assets/screenshots/rooms.png" alt="Searching for battle" loading="lazy" />
			<img src="assets/screenshots/battles-tab.png" alt="Battles tab" loading="lazy" />
			<img src="assets/screenshots/battle.png" alt="Battle" loading="lazy" />
			<img src="assets/screenshots/battle-moves.png" alt="Battle moves" loading="lazy" />
			<img src="assets/screenshots/challenge.png" alt="Challenge" loading="lazy" />
			<img src="assets/screenshots/teambuilder-home.png" alt="Teambuilder" loading="lazy" />
			<img src="assets/screenshots/teambuilder.png" alt="Team editor" loading="lazy" />
			<img src="assets/screenshots/profile.png" alt="Profile" loading="lazy" />
		</section>

		<footer class="footer">
			<p>Made by p9</p>
			<p>Unofficial. Not affiliated with Pokémon Showdown.</p>
			<p><a href="https://play.pokemonshowdown.com/" target="_blank" rel="noopener">play.pokemonshowdown.com</a></p>
		</footer>
	</main>
</body>
</html>
