# psapk.pnine.me — HTTP only (add TLS later with certbot)
#
# Run these on your Linux server (not on your Mac):
#   SITE=$(realpath ~/pnine.me/psapk.pnine.me)
#   sudo cp nginx/psapk.pnine.me.conf /etc/nginx/sites-available/psapk.pnine.me
#   sudo sed -i "s|@@SITE_ROOT@@|$SITE|" /etc/nginx/sites-available/psapk.pnine.me
#   sudo ln -sf /etc/nginx/sites-available/psapk.pnine.me /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS later:
#   sudo certbot --nginx -d psapk.pnine.me

server {
    listen 80;
    listen [::]:80;
    server_name psapk.pnine.me;

    root @@SITE_ROOT@@;
    index index.html;

    access_log /var/log/nginx/psapk.pnine.me.access.log;
    error_log  /var/log/nginx/psapk.pnine.me.error.log;

    charset utf-8;
    sendfile on;
    send_timeout 300s;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;

    location /downloads/ {
        types {
            application/vnd.android.package-archive apk;
        }
        add_header Content-Disposition 'attachment; filename="ps-x.apk"' always;
        gzip off;
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
